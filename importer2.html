<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo Feeder Importer PRO</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style type="text/tailwindcss">
@import "tailwindcss";
@theme {
  --font-outfit: 'Outfit', sans-serif;
  --color-accent: #f0a500;
  --color-accent-hover: #c48800;
  --color-accent-glow: rgba(240,165,0,0.12);
  --color-surface: #151822;
  --surface-alt: #111420;
  --border-subtle: #252836;
  --border-active: #3a3e52;
}
</style>
<style>
:root{--bg:#0c0e14;--card:#151822;--card2:#1c1f2e;--input:#111420;--bdr:#252836;--bdr2:#333650;--tx:#e4e5ea;--tx2:#a0a3b5;--tx3:#6c7086;--accent:#f0a500;--accent2:#c48800;--glow:rgba(240,165,0,0.12);--ok:#10b981;--warn:#eab308;--err:#ef4444;--info:#06b6d4}
body.light{--bg:#f3f4f8;--card:#ffffff;--card2:#f0f1f5;--input:#f0f1f5;--bdr:#dfe1e8;--bdr2:#c8cad3;--tx:#1a1d27;--tx2:#4a4d5e;--tx3:#8a8da0;--glow:rgba(240,165,0,0.08)}
*{font-family:'Outfit',sans-serif;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);margin:0;min-height:100vh;transition:background .3s,color .3s}
body::before{content:'';position:fixed;top:-250px;right:-250px;width:700px;height:700px;background:radial-gradient(circle,rgba(240,165,0,.05)0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-300px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(6,182,212,.03)0%,transparent 70%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--tx3)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes pulseG{0%,100%{box-shadow:0 0 15px var(--glow)}50%{box-shadow:0 0 30px var(--glow)}}
@keyframes barGrow{from{width:0}}
@keyframes spin{to{transform:rotate(360deg)}}
.anim-fade{animation:fadeUp .35s ease-out both}
.anim-fade-d1{animation:fadeUp .35s .08s ease-out both}
.anim-fade-d2{animation:fadeUp .35s .16s ease-out both}
.anim-fade-d3{animation:fadeUp .35s .24s ease-out both}

.sidebar-link{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:10px;color:var(--tx2);transition:all .2s;cursor:pointer;font-size:14px;font-weight:500;position:relative;margin:2px 0}
.sidebar-link:hover{background:rgba(240,165,0,.06);color:var(--accent)}
.sidebar-link.active{background:rgba(240,165,0,.1);color:var(--accent);font-weight:600}
.sidebar-link.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:0 3px 3px 0}
.sidebar-group{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--tx3);padding:16px 16px 6px;margin-top:8px}

.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;transition:border-color .2s}
.card:hover{border-color:var(--bdr2)}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .2s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--accent);color:#0c0e14}.btn-p:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-s{background:var(--card2);color:var(--tx);border:1px solid var(--bdr)}.btn-s:hover{background:var(--bdr);border-color:var(--bdr2)}
.btn-d{background:rgba(239,68,68,.12);color:var(--err);border:1px solid rgba(239,68,68,.2)}.btn-d:hover{background:rgba(239,68,68,.2)}
.btn-ok{background:rgba(16,185,129,.12);color:var(--ok);border:1px solid rgba(16,185,129,.2)}.btn-ok:hover{background:rgba(16,185,129,.2)}

.ipt{width:100%;padding:10px 14px;background:var(--input);border:1px solid var(--bdr);border-radius:10px;color:var(--tx);font-size:14px;transition:all .2s;outline:none;font-family:inherit}
.ipt:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.ipt::placeholder{color:var(--tx3)}
textarea.ipt{resize:vertical;min-height:120px;font-family:'Courier New',monospace;font-size:13px}

.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--card2);color:var(--tx2);font-weight:600;padding:10px 14px;text-align:left;position:sticky;top:0;z-index:2;border-bottom:1px solid var(--bdr)}
.tbl td{padding:8px 14px;border-bottom:1px solid var(--bdr);color:var(--tx2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl tr:hover td{background:rgba(240,165,0,.03)}

.drop-zone{border:2px dashed var(--bdr2);border-radius:14px;padding:40px;text-align:center;cursor:pointer;transition:all .3s}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:var(--glow)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-ok{background:rgba(16,185,129,.12);color:var(--ok)}
.badge-warn{background:rgba(234,179,8,.12);color:var(--warn)}
.badge-err{background:rgba(239,68,68,.12);color:var(--err)}
.badge-info{background:rgba(6,182,212,.12);color:var(--info)}

.log-ok{color:var(--ok)}.log-warn{color:var(--warn)}.log-err{color:var(--err)}.log-info{color:var(--info)}

.toast-box{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{pointer-events:auto;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;animation:fadeUp .3s ease-out;backdrop-filter:blur(10px);border:1px solid var(--bdr);display:flex;align-items:center;gap:10px;max-width:380px}
.toast.out{animation:fadeIn .25s ease-out reverse both}
.toast-ok{background:rgba(16,185,129,.15);color:var(--ok);border-color:rgba(16,185,129,.3)}
.toast-err{background:rgba(239,68,68,.15);color:var(--err);border-color:rgba(239,68,68,.3)}
.toast-warn{background:rgba(234,179,8,.15);color:var(--warn);border-color:rgba(234,179,8,.3)}
.toast-info{background:rgba(6,182,212,.15);color:var(--info);border-color:rgba(6,182,212,.3)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal-box{background:var(--card);border:1px solid var(--bdr);border-radius:16px;max-width:640px;width:90%;max-height:80vh;overflow-y:auto;animation:fadeUp .3s ease-out}

.progress-track{background:var(--card2);border-radius:8px;height:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:8px;transition:width .4s ease;background:linear-gradient(90deg,var(--accent),#fbbf24)}

.stat-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px 20px;text-align:center}
.stat-num{font-size:28px;font-weight:800;line-height:1.1}
.stat-lbl{font-size:12px;color:var(--tx3);margin-top:4px;font-weight:500}

.spin{animation:spin 1s linear infinite}

@media(max-width:768px){
  .sidebar-wrap{position:fixed!important;z-index:500;transform:translateX(-100%);transition:transform .3s}
  .sidebar-wrap.open{transform:translateX(0)}
  .main-wrap{margin-left:0!important}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:499}
  .overlay.show{display:block}
}
</style>
</head>
<body>
<div class="toast-box" id="toasts"></div>
<div class="overlay" id="overlay"></div>

<div class="flex min-h-screen relative" style="z-index:1">
  <!-- Sidebar -->
  <aside class="sidebar-wrap w-[260px] min-w-[260px] h-screen sticky top-0 flex flex-col border-r" id="sidebar" style="background:var(--card);border-color:var(--bdr)">
    <div class="p-5 flex items-center gap-3 border-b" style="border-color:var(--bdr)">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:var(--accent)">
        <i class="fa-solid fa-bolt text-sm" style="color:#0c0e14"></i>
      </div>
      <div>
        <div class="font-bold text-sm" style="color:var(--tx)">Neo Feeder</div>
        <div class="text-[11px] font-semibold" style="color:var(--accent)">Importer PRO</div>
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto py-2 px-3" id="sidebar-nav"></nav>
    <div class="p-4 border-t" style="border-color:var(--bdr)" id="sidebar-footer"></div>
  </aside>

  <!-- Main -->
  <div class="main-wrap flex-1 flex flex-col min-h-screen" style="margin-left:0">
    <header class="sticky top-0 z-40 border-b flex items-center gap-4 px-5 h-[60px]" style="background:var(--card);border-color:var(--bdr);backdrop-filter:blur(12px)">
      <button class="md:hidden w-9 h-9 flex items-center justify-center rounded-lg" style="background:var(--card2)" onclick="toggleSidebar()">
        <i class="fa-solid fa-bars text-sm" style="color:var(--tx2)"></i>
      </button>
      <div class="flex-1">
        <h1 class="text-sm font-bold" id="page-title" style="color:var(--tx)">Konfigurasi API</h1>
        <p class="text-[11px]" id="page-subtitle" style="color:var(--tx3)">Atur koneksi ke server Neo Feeder</p>
      </div>
      <div class="flex items-center gap-2">
        <button class="w-9 h-9 rounded-lg flex items-center justify-center transition-colors" style="background:var(--card2)" onclick="toggleTheme()" title="Toggle tema">
          <i class="fa-solid fa-moon text-sm" style="color:var(--tx2)" id="theme-icon"></i>
        </button>
        <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg" style="background:var(--card2)" id="status-badge">
          <span class="w-2 h-2 rounded-full" style="background:var(--err)" id="status-dot"></span>
          <span class="text-xs font-semibold" style="color:var(--tx3)" id="status-text">Offline</span>
        </div>
      </div>
    </header>
    <main class="flex-1 p-5 md:p-6 relative" style="z-index:1" id="page-container"></main>
  </div>
</div>

<div id="modal-root"></div>

<script>
// ==========================================
// KONSTANTA & KONFIGURASI
// ==========================================
const DEFAULT_URL = 'http://localhost:3003/ws/live2.php';
const SK = { url:'nf_url', user:'nf_user', pass:'nf_pass', token:'nf_token', tokens:'nf_tokens', activeTk:'nf_active_tk', settings:'nf_settings', logs:'nf_logs', dark:'nf_dark' };

const menuItems = [
  { id:'config', label:'Konfigurasi API', icon:'fa-gear', group:null },
  { id:'mahasiswa', label:'Mahasiswa', icon:'fa-user-graduate', group:'Import Data' },
  { id:'kelas', label:'Kelas Kuliah', icon:'fa-chalkboard-user', group:'Import Data' },
  { id:'jadwal', label:'Jadwal Kuliah', icon:'fa-calendar-days', group:'Import Data' },
  { id:'krs', label:'KRS', icon:'fa-list-check', group:'Import Data' },
  { id:'khs', label:'KHS', icon:'fa-file-lines', group:'Import Data' },
  { id:'akm', label:'AKM', icon:'fa-chart-line', group:'Import Data' },
  { id:'aktivitas', label:'Aktivitas', icon:'fa-person-running', group:'Import Data' },
  { id:'kelulusan', label:'Kelulusan', icon:'fa-graduation-cap', group:'Import Data' },
  { id:'testapi', label:'Test API', icon:'fa-flask-vial', group:'Alat Bantu' },
  { id:'reference', label:'Reference WS', icon:'fa-book-open', group:'Alat Bantu' },
];

const importCfg = {
  mahasiswa:{ method:'InsertMahasiswa', keyFields:['nim'], label:'Mahasiswa', desc:'Import data mahasiswa baru ke Neo Feeder' },
  kelas:{ method:'InsertKelasKuliah', keyFields:['id_kelas_kuliah'], label:'Kelas Kuliah', desc:'Import data kelas kuliah semester berjalan' },
  jadwal:{ method:'InsertJadwalKuliah', keyFields:['id_kelas_kuliah','id_ruang','id_waktu'], label:'Jadwal Kuliah', desc:'Import jadwal perkuliahan' },
  krs:{ method:'InsertKRS', keyFields:['id_kelas_kuliah','nim'], label:'KRS', desc:'Import Kartu Rencana Study mahasiswa' },
  khs:{ method:'InsertKHS', keyFields:['id_kelas_kuliah','nim'], label:'KHS', desc:'Import Kartu Hasil Study mahasiswa' },
  akm:{ method:'InsertAKM', keyFields:['nim','id_periode'], label:'AKM', desc:'Import Aktivitas Kemahasiswaan Mahasiswa' },
  aktivitas:{ method:'InsertAktivitasMahasiswa', keyFields:['id_aktivitas'], label:'Aktivitas Mahasiswa', desc:'Import data aktivitas kemahasiswaan' },
  kelulusan:{ method:'InsertKelulusanMahasiswa', keyFields:['nim'], label:'Kelulusan Mahasiswa', desc:'Import data kelulusan mahasiswa' },
};

// ==========================================
// DOKUMENTASI WEB SERVICE
// ==========================================
const wsDocs = {
  GetToken:{
    desc:'Mendapatkan token autentikasi untuk mengakses semua endpoint API Neo Feeder.',
    fields:[
      {name:'username',type:'string',req:true,desc:'Username akun Neo Feeder'},
      {name:'password',type:'string',req:true,desc:'Password akun Neo Feeder'}
    ],
    example:{username:'admin',password:'password123'}
  },
  InsertMahasiswa:{
    desc:'Menambahkan data mahasiswa baru ke database PDDIKTI melalui Neo Feeder.',
    fields:[
      {name:'nama_mahasiswa',type:'string',req:true,desc:'Nama lengkap mahasiswa'},
      {name:'nim',type:'string',req:true,desc:'Nomor Induk Mahasiswa (unik)'},
      {name:'tempat_lahir',type:'string',req:false,desc:'Tempat lahir'},
      {name:'tanggal_lahir',type:'string',req:false,desc:'Format YYYY-MM-DD'},
      {name:'id_jenis_kelamin',type:'string',req:false,desc:'L / P'},
      {name:'nik',type:'string',req:false,desc:'Nomor Induk Kependudukan'},
      {name:'id_agama',type:'string',req:false,desc:'Kode agama (1-7)'},
      {name:'id_prodi',type:'string',req:true,desc:'Kode program studi'},
      {name:'mulai_bulan',type:'string',req:false,desc:'Bulan mulai studi (1-12)'},
      {name:'mulai_tahun',type:'string',req:false,desc:'Tahun mulai studi'}
    ],
    example:{nama_mahasiswa:'Budi Santoso',nim:'2024001',tempat_lahir:'Jakarta',tanggal_lahir:'2000-01-15',id_jenis_kelamin:'L',nik:'3201011501000001',id_agama:'1',id_prodi:'A1B2C3D4',mulai_bulan:'9',mulai_tahun:'2024'}
  },
  InsertKelasKuliah:{
    desc:'Menambahkan data kelas kuliah pada semester berjalan.',
    fields:[
      {name:'id_kelas_kuliah',type:'string',req:true,desc:'ID unik kelas kuliah'},
      {name:'id_matkul',type:'string',req:true,desc:'Kode mata kuliah'},
      {name:'id_dosen',type:'string',req:true,desc:'Kode dosen pengampu'},
      {name:'id_ruang',type:'string',req:false,desc:'Kode ruang kelas'},
      {name:'id_semester',type:'string',req:true,desc:'Kode semester'},
      {name:'nama_kelas_kuliah',type:'string',req:true,desc:'Nama kelas (A, B, C, ...)'},
      {name:'bahasan',type:'string',req:false,desc:'Bahasan perkuliahan'},
      {name:'mode',type:'string',req:false,desc:'Mode kuliah'}
    ],
    example:{id_kelas_kuliah:'KK-001',id_matkul:'MK001',id_dosen:'DSN01',id_ruang:'R101',id_semester:'20241',nama_kelas_kuliah:'A',bahasan:'Pengantar',mode:'Offline'}
  },
  InsertJadwalKuliah:{
    desc:'Menambahkan jadwal perkuliahan untuk kelas kuliah tertentu.',
    fields:[
      {name:'id_kelas_kuliah',type:'string',req:true,desc:'ID kelas kuliah'},
      {name:'id_ruang',type:'string',req:true,desc:'Kode ruang'},
      {name:'id_waktu',type:'string',req:true,desc:'Kode waktu (hari + jam)'},
      {name:'hari',type:'string',req:false,desc:'Hari (Senin-Sabtu)'},
      {name:'jam_mulai',type:'string',req:false,desc:'Jam mulai (HH:MM:SS)'},
      {name:'jam_selesai',type:'string',req:false,desc:'Jam selesai (HH:MM:SS)'}
    ],
    example:{id_kelas_kuliah:'KK-001',id_ruang:'R101',id_waktu:'W001',hari:'Senin',jam_mulai:'08:00:00',jam_selesai:'09:40:00'}
  },
  InsertKRS:{
    desc:'Menambahkan data KRS (Kartu Rencana Studi) mahasiswa.',
    fields:[
      {name:'id_kelas_kuliah',type:'string',req:true,desc:'ID kelas kuliah'},
      {name:'nim',type:'string',req:true,desc:'NIM mahasiswa'},
      {name:'id_periode',type:'string',req:false,desc:'Kode periode'},
      {name:'status_krs',type:'string',req:false,desc:'Status KRS'}
    ],
    example:{id_kelas_kuliah:'KK-001',nim:'2024001',id_periode:'20241',status_krs:'Ambil'}
  },
  InsertKHS:{
    desc:'Menambahkan data KHS (Kartu Hasil Studi) mahasiswa.',
    fields:[
      {name:'id_kelas_kuliah',type:'string',req:true,desc:'ID kelas kuliah'},
      {name:'nim',type:'string',req:true,desc:'NIM mahasiswa'},
      {name:'id_periode',type:'string',req:false,desc:'Kode periode'},
      {name:'nilai_huruf',type:'string',req:false,desc:'Nilai huruf (A, B, C, D, E)'},
      {name:'nilai_index',type:'number',req:false,desc:'Nilai indeks (0-4)'},
      {name:'nilai_angka',type:'string',req:false,desc:'Nilai angka'}
    ],
    example:{id_kelas_kuliah:'KK-001',nim:'2024001',id_periode:'20241',nilai_huruf:'A',nilai_index:4,nilai_angka:'85'}
  },
  InsertAKM:{
    desc:'Menambahkan data AKM (Aktivitas Kemahasiswaan Mahasiswa) per periode.',
    fields:[
      {name:'nim',type:'string',req:true,desc:'NIM mahasiswa'},
      {name:'id_periode',type:'string',req:true,desc:'Kode periode'},
      {name:'id_prodi',type:'string',req:false,desc:'Kode program studi'},
      {name:'ips',type:'number',req:false,desc:'Indeks Prestasi Semester'},
      {name:'ipk',type:'number',req:false,desc:'Indeks Prestasi Kumulatif'},
      {name:'sks_semester',type:'number',req:false,desc:'Total SKS semester'},
      {name:'sks_kumulatif',type:'number',req:false,desc:'Total SKS kumulatif'},
      {name:'biaya_kuliah',type:'number',req:false,desc:'Biaya kuliah semester'},
      {name:'id_status_mahasiswa',type:'string',req:false,desc:'Status mahasiswa (A/K/L/D)'}
    ],
    example:{nim:'2024001',id_periode:'20241',id_prodi:'A1B2C3D4',ips:3.5,ipk:3.4,sks_semester:20,sks_kumulatif:40,id_status_mahasiswa:'A'}
  },
  InsertAktivitasMahasiswa:{
    desc:'Menambahkan data aktivitas kemahasiswaan (organisasi, prestasi, dll).',
    fields:[
      {name:'id_aktivitas',type:'string',req:true,desc:'ID unik aktivitas'},
      {name:'nim',type:'string',req:true,desc:'NIM mahasiswa'},
      {name:'id_jenis_aktivitas',type:'string',req:true,desc:'Kode jenis aktivitas'},
      {name:'id_periode',type:'string',req:false,desc:'Kode periode'},
      {name:'nama_aktivitas',type:'string',req:false,desc:'Nama aktivitas'},
      {name:'deskripsi',type:'string',req:false,desc:'Deskripsi aktivitas'},
      {name:'tanggal_mulai',type:'string',req:false,desc:'Tanggal mulai (YYYY-MM-DD)'},
      {name:'tanggal_selesai',type:'string',req:false,desc:'Tanggal selesai (YYYY-MM-DD)'}
    ],
    example:{id_aktivitas:'AKT-001',nim:'2024001',id_jenis_aktivitas:'JA01',id_periode:'20241',nama_aktivitas:'Ketua BEM',deskripsi:'Menjabat sebagai ketua BEM fakultas',tanggal_mulai:'2024-01-15',tanggal_selesai:'2024-12-31'}
  },
  InsertKelulusanMahasiswa:{
    desc:'Menambahkan data kelulusan mahasiswa ke PDDIKTI.',
    fields:[
      {name:'nim',type:'string',req:true,desc:'NIM mahasiswa'},
      {name:'id_periode',type:'string',req:true,desc:'Periode kelulusan'},
      {name:'tanggal_yudisium',type:'string',req:false,desc:'Tanggal yudisium (YYYY-MM-DD)'},
      {name:'tanggal_sk_yudisium',type:'string',req:false,desc:'Tanggal SK yudisium'},
      {name:'nomor_sk_yudisium',type:'string',req:false,desc:'Nomor SK yudisium'},
      {name:'ipk',type:'number',req:false,desc:'IPK saat kelulusan'},
      {name:'predikat',type:'string',req:false,desc:'Predikat kelulusan'},
      {name:'id_jenjang_pendidikan',type:'string',req:false,desc:'Kode jenjang pendidikan'}
    ],
    example:{nim:'2024001',id_periode:'20241',tanggal_yudisium:'2024-09-20',tanggal_sk_yudisium:'2024-09-18',nomor_sk_yudisium:'SK/YUD/001/2024',ipk:3.75,predikat:'Cum Laude',id_jenjang_pendidikan:'S1'}
  }
};

// ==========================================
// STATE MANAGEMENT
// ==========================================
const state = {
  page: 'config',
  apiUrl: DEFAULT_URL,
  username: '',
  password: '',
  token: '',
  tokens: [],
  activeTokenIdx: 0,
  importing: false,

// ==========================================
// FUNGSI CORE API
// ==========================================

/* requestNeo - fungsi dasar request ke Neo Feeder */
async function requestNeo(act, data) {
  const body = { act, token: state.token || '', data };
  const res = await fetch(state.apiUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  const json = await res.json();
  return json;
}

/* requestWithRetry - request dengan auto retry */
async function requestWithRetry(act, data, maxRetry) {
  const delays = [1000, 2000, 3000];
  let lastErr = null;
  for (let i = 0; i <= maxRetry; i++) {
    try {
      const res = await requestNeo(act, data);
      if (isDuplicateError(res)) {
        return { ...res, _skip: true };
      }
      return res;
    } catch(e) {
      lastErr = e;
      if (i < maxRetry) {
        const delay = delays[Math.min(i, delays.length - 1)];
        addLog(`RETRY ${i + 1}/${maxRetry} - ${e.message}`, 'warn');
        await sleep(delay);
      }
    }
  }
  throw lastErr;
}

/* isDuplicateError - cek apakah response menandakan duplikat */
function isDuplicateError(res) {
  if (!res) return false;
  const s = JSON.stringify(res).toLowerCase();
  return ['sudah ada','duplicate','exists','duplikat','sudah terdaftar'].some(k => s.includes(k));
}

/* getKeyFields - ambil field kunci untuk deteksi duplikat */
function getKeyFields(type) {
  return importCfg[type]?.keyFields || [];
}

/* removeDuplicate - hapus duplikat berdasarkan key fields */
function removeDuplicate(data, type) {
  const keys = getKeyFields(type);
  if (!keys.length) return { filtered: data, removed: 0 };
  const seen = new Set();
  const filtered = [];
  let removed = 0;
  for (const item of data) {
    const kv = keys.map(k => String(item[k] || '')).join('||');
    if (seen.has(kv)) {
      removed++;
      addLog(`SKIP DUPLIKAT (LOCAL) - ${keys.map(k=>`${k}=${item[k]}`).join(', ')}`, 'warn');
    } else {
      seen.add(kv);
      filtered.push(item);
    }
  }
  return { filtered, removed };
}

/* sleep helper */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ==========================================
// IMPORT ENGINE
// ==========================================

async function startImport(data, type, opts) {
  if (state.importing) return;
  if (!state.token) { toast('Token belum tersedia. Silakan login terlebih dahulu.', 'err'); return; }

  const method = importCfg[type].method;
  const { filtered, removed } = removeDuplicate(data, type);
  if (!filtered.length) { toast('Tidak ada data untuk diimport setelah deduplikasi.', 'warn'); return; }

  state.importing = true;
  state.progress = { total: filtered.length, success: 0, failed: 0, skipped: removed, current: 0 };
  state.failedData = [];
  updateProgressUI(type);
  addLog(`=== IMPORT ${importCfg[type].label} DIMULAI ===`, 'info');
  addLog(`Total data: ${data.length}, Duplikat lokal: ${removed}, Diproses: ${filtered.length}`, 'info');
  addLog(`Batch size: ${opts.batchSize}, Delay: ${opts.batchDelay}ms, Retry: ${opts.maxRetry}x, Parallel: ${opts.parallel}`, 'info');

  const batches = [];
  for (let i = 0; i < filtered.length; i += opts.batchSize) {
    batches.push(filtered.slice(i, i + opts.batchSize));
  }

  const concurrency = Math.max(1, Math.min(opts.parallel, 10));

  for (let bi = 0; bi < batches.length; bi++) {
    if (!state.importing) { addLog('Import dibatalkan oleh pengguna.', 'warn'); break; }
    const batch = batches[bi];
    const results = await runParallel(batch, concurrency, method, opts.maxRetry);
    for (const r of results) {
      if (r._skip) {
        state.progress.skipped++;
        addLog(`SKIP (SERVER): ${r._key || '-'}`, 'warn');
      } else if (r._ok) {
        state.progress.success++;
      } else {
        state.progress.failed++;
        state.failedData.push(r._item);
        addLog(`GAGAL: ${r._err}`, 'err');
      }
    }
    state.progress.current += batch.length;
    updateProgressUI(type);
    if (bi < batches.length - 1) await sleep(opts.batchDelay);
  }

  state.importing = false;
  addLog(`=== IMPORT SELESAI === Sukses: ${state.progress.success}, Gagal: ${state.progress.failed}, Skip: ${state.progress.skipped}`, 'info');
  toast(`Import selesai! Sukses: ${state.progress.success}, Gagal: ${state.progress.failed}`, state.progress.failed > 0 ? 'warn' : 'ok');
  save(SK.logs, JSON.stringify(state.logs.slice(-500)));
  updateProgressUI(type);
  updateFailedBtn(type);
}

async function runParallel(items, concurrency, method, maxRetry) {
  const results = [];
  const executing = new Set();
  for (const item of items) {
    if (!state.importing) break;
    const p = processOneItem(item, method, maxRetry).then(r => { executing.delete(p); return r; });
    executing.add(p);
    results.push(p);
    if (executing.size >= concurrency) await Promise.race(executing);
  }
  return Promise.all(results);
}

async function processOneItem(item, method, maxRetry) {
  const keys = getKeyFields(Object.keys(importCfg).find(k => importCfg[k].method === method) || '');
  const keyStr = keys.map(k => `${k}=${item[k]}`).join(', ');
  try {
    const res = await requestWithRetry(method, item, maxRetry);
    if (res._skip) return { _skip: true, _key: keyStr };
    if (res.error_code === '0' || res.status === 'ok' || !res.error_code) {
      addLog(`OK: ${keyStr}`, 'ok');
      return { _ok: true };
    }
    addLog(`RESPONSE: ${JSON.stringify(res).slice(0, 120)}`, 'warn');
    return { _ok: false, _item: item, _err: JSON.stringify(res).slice(0, 100) };
  } catch(e) {
    return { _ok: false, _item: item, _err: e.message };
  }
}

function cancelImport() {
  state.importing = false;
  addLog('Membatalkan import...', 'warn');
}

// ==========================================
// FILE PARSING
// ==========================================

function parseJSON(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        let data = JSON.parse(e.target.result);
        if (!Array.isArray(data)) data = [data];
        resolve(data);
      } catch(err) { reject(new Error('JSON tidak valid: ' + err.message)); }
    };
    reader.onerror = () => reject(new Error('Gagal membaca file'));
    reader.readAsText(file);
  });
}

function parseCSV(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const text = e.target.result;
        const lines = parseCSVLines(text);
        if (lines.length < 2) { resolve([]); return; }
        const headers = lines[0].map(h => h.trim());
        const data = [];
        for (let i = 1; i < lines.length; i++) {
          const obj = {};
          headers.forEach((h, idx) => { obj[h] = (lines[i][idx] || '').trim(); });
          data.push(obj);
        }
        resolve(data);
      } catch(err) { reject(new Error('CSV tidak valid: ' + err.message)); }
    };
    reader.onerror = () => reject(new Error('Gagal membaca file'));
    reader.readAsText(file);
  });
}

function parseCSVLines(text) {
  const lines = [];
  let current = [];
  let field = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { field += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { current.push(field); field = ''; }
      else if (ch === '\r' && text[i+1] === '\n') { current.push(field); field = ''; lines.push(current); current = []; i++; }
      else if (ch === '\n') { current.push(field); field = ''; lines.push(current); current = []; }
      else { field += ch; }
    }
  }
  if (field || current.length) { current.push(field); lines.push(current); }
  return lines;
}

function parseExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
        resolve(json);
      } catch(err) { reject(new Error('Excel tidak valid: ' + err.message)); }
    };
    reader.onerror = () => reject(new Error('Gagal membaca file'));
    reader.readAsArrayBuffer(file);
  });
}

async function parseFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'json') return parseJSON(file);
  if (ext === 'csv') return parseCSV(file);
  if (['xlsx','xls'].includes(ext)) return parseExcel(file);
  throw new Error('Format file tidak didukung. Gunakan JSON, CSV, atau Excel (.xlsx/.xls).');
}

function toast(msg, type) {
  const c = document.getElementById('toasts');
  const icons = { ok:'fa-check-circle', err:'fa-times-circle', warn:'fa-exclamation-triangle', info:'fa-info-circle' };
  const el = document.createElement('div');
  el.className = `toast toast-${type || 'info'}`;
  el.innerHTML = `<i class="fa-solid ${icons[type]||icons.info}"></i><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, 3500);
}

function addLog(msg, type) {
  state.logs.push({ msg, type, time: new Date().toISOString() });
  if (state.logs.length > 1000) state.logs = state.logs.slice(-500);
  const el = document.getElementById('log-area');
  if (!el) return;
  const d = new Date();
  const ts = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  el.innerHTML += `<div class="log-${type||'info'} text-xs py-0.5 font-mono">[${ts}] ${escHtml(msg)}</div>`;
  el.scrollTop = el.scrollHeight;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderTable(data, container, limit) {
  if (!data.length) { container.innerHTML = `<div class="text-center py-8" style="color:var(--tx3)"><i class="fa-solid fa-inbox text-3xl mb-3 block"></i>Tidak ada data</div>`; return; }
  const show = data.slice(0, limit || 50);
  const cols = Object.keys(show[0]);
  let h = `<div class="overflow-auto rounded-xl border" style="border-color:var(--bdr);max-height:360px"><table class="tbl"><thead><tr>`;
  h += `<th class="text-xs" style="color:var(--tx3)">#</th>`;
  cols.forEach(c => { h += `<th class="text-xs">${escHtml(c)}</th>`; });
  h += `</tr></thead><tbody>`;
  show.forEach((row, i) => {
    h += `<tr><td style="color:var(--tx3)">${i+1}</td>`;
    cols.forEach(c => { h += `<td title="${escHtml(String(row[c]))}">${escHtml(String(row[c] ?? ''))}</td>`; });
    h += `</tr>`;
  });
  h += `</tbody></table></div>`;
  if (data.length > (limit || 50)) {
    h += `<div class="text-xs mt-2 text-center" style="color:var(--tx3)">Menampilkan ${(limit||50)} dari ${data.length} data</div>`;
  }
  container.innerHTML = h;
}

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadText(text, filename) {
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function updateProgressUI(type) {
  const p = state.progress;
  const pct = p.total > 0 ? Math.round(((p.success + p.failed + p.skipped) / (p.total + p.skipped)) * 100) : 0;
  const elPct = document.getElementById('prog-pct');
  const elBar = document.getElementById('prog-bar');
  const elStats = document.getElementById('prog-stats');
  if (elPct) elPct.textContent = pct + '%';
  if (elBar) elBar.style.width = pct + '%';
  if (elStats) {
    elStats.innerHTML = `
      <div class="stat-card"><div class="stat-num" style="color:var(--tx)">${p.total}</div><div class="stat-lbl">Total</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--ok)">${p.success}</div><div class="stat-lbl">Sukses</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--err)">${p.failed}</div><div class="stat-lbl">Gagal</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--warn)">${p.skipped}</div><div class="stat-lbl">Skip</div></div>
    `;
  }
}

function updateFailedBtn(type) {

function quickUseMethod(method) {
  closeModal();

  if (method === 'GetToken') { navigateTo('config'); return; }
  const typeKey = Object.keys(importCfg).find(k => importCfg[k].method === method);
  if (typeKey) {
    navigateTo(typeKey);
    if (doc?.example) {
      setTimeout(() => {
        const ta = document.getElementById('test-data');
        if (ta) ta.value = JSON.stringify(doc.example, null, 2);
      }, 300);
    }
  } else {
    navigateTo('testapi');
    setTimeout(() => {
      const sel = document.getElementById('test-act');
      if (sel) { sel.value = method; sel.dispatchEvent(new Event('change')); }
    }, 300);
  }

async function handleLogin() {
  const url = document.getElementById('cfg-url').value.trim();
  const user = document.getElementById('cfg-user').value.trim();
  const pass = document.getElementById('cfg-pass').value.trim();
  if (!url) { toast('URL endpoint wajib diisi', 'err'); return; }
  if (!user) { toast('Username wajib diisi', 'err'); return; }
  if (!pass) { toast('Password wajib diisi', 'err'); return; }

  state.apiUrl = url;
  state.username = user;
  state.password = pass;

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner spin"></i> Mengambil token...';

  try {
    const res = await requestNeo('GetToken', { username: user, password: pass });
    if (res.token) {
      state.token = res.token;
      save(SK.token, state.token);
      toast('Login berhasil! Token tersimpan.', 'ok');
      updateAuthUI();
      addLog(`Login berhasil. Token: ${state.token.slice(0,20)}...`, 'ok');
    } else {
      toast('Login gagal: ' + (res.error_desc || res.message || JSON.stringify(res)), 'err');
      addLog('Login gagal: ' + JSON.stringify(res), 'err');
    }
  } catch(e) {
    toast('Gagal menghubungi server: ' + e.message, 'err');
    addLog('Koneksi gagal: ' + e.message, 'err');
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login & Ambil Token';
  saveAll();
}

function handleSaveConfig() {
  state.apiUrl = document.getElementById('cfg-url').value.trim() || DEFAULT_URL;
  state.username = document.getElementById('cfg-user').value.trim();
  state.password = document.getElementById('cfg-pass').value.trim();
  saveAll();
  toast('Konfigurasi tersimpan', 'ok');
}

function handleLogout() {
  state.token = '';
  save(SK.token, '');
  updateAuthUI();
  toast('Token dihapus', 'info');
}

function handleAddToken() {
  const name = state.tokens.length > 0 ? `Profil ${state.tokens.length + 1}` : 'Default';
  state.tokens.push({ name, username: '', password: '', token: '' });
  state.activeTokenIdx = state.tokens.length - 1;
  saveAll();
  renderTokenList();
}

function switchToken(idx) {
  const t = state.tokens[idx];
  if (!t) return;
  state.activeTokenIdx = idx;
  state.username = t.username || '';
  state.password = t.password || '';
  state.token = t.token || '';
  saveAll();
  updateAuthUI();
  renderTokenList();
  if (t.username && t.password && !t.token) {
    toast('Profil dipilih. Klik Login untuk mengambil token.', 'info');
  } else {
    toast(`Switch ke profil "${t.name}"`, 'ok');
  }
}

function removeToken(idx) {
  state.tokens.splice(idx, 1);
  if (state.activeTokenIdx >= state.tokens.length) state.activeTokenIdx = Math.max(0, state.tokens.length - 1);
  saveAll();
  renderTokenList();
}

function handleSaveSettings() {
  state.settings.batchSize = Math.max(1, parseInt(document.getElementById('set-batch').value) || 20);
  state.settings.batchDelay = Math.max(100, parseInt(document.getElementById('set-delay').value) || 300);
  state.settings.maxRetry = Math.max(0, parseInt(document.getElementById('set-retry').value) || 3);
  state.settings.parallel = Math.max(1, parseInt(document.getElementById('set-parallel').value) || 1);
  saveAll();
  toast('Pengaturan import tersimpan', 'ok');
}

async function handleFileUpload(type, file) {
  try {
    const data = await parseFile(file);
    if (!data.length) { toast('File kosong atau tidak memiliki data yang valid', 'warn'); return; }
    state.previewData = data;
    state.previewType = type;

    const card = document.getElementById(`preview-card-${type}`);
    const countEl = document.getElementById(`preview-count-${type}`);
    const dupEl = document.getElementById(`preview-dup-${type}`);
    const tableEl = document.getElementById(`preview-table-${type}`);

    card.style.display = '';
    countEl.textContent = `${data.length} data`;

    const { removed } = removeDuplicate(data, type);
    // Reset logs untuk dup count (karena removeDuplicate menambah log)
    // Kita hitung ulang tanpa log
    const keys = getKeyFields(type);
    const seen = new Set();
    let dupCount = 0;
    for (const item of data) {
      const kv = keys.map(k => String(item[k] || '')).join('||');
      if (seen.has(kv)) dupCount++;
      seen.add(kv);
    }
    dupEl.textContent = dupCount > 0 ? `${dupCount} duplikat` : '';
    dupEl.className = dupCount > 0 ? 'badge badge-warn' : 'badge badge-ok';

    renderTable(data, tableEl, 50);

    const startBtn = document.getElementById(`btn-start-${type}`);
    if (startBtn) startBtn.disabled = false;

    toast(`File "${file.name}" berhasil dimuat: ${data.length} data`, 'ok');
  } catch(e) {
    toast(e.message, 'err');
  }
}

async function handleStartImport(type) {
  if (state.importing) return;
  if (!state.token) { toast('Token belum tersedia. Silakan login terlebih dahulu.', 'err'); return; }
  if (!state.previewData.length) { toast('Tidak ada data untuk diimport', 'warn'); return; }

  const batchSize = Math.max(1, parseInt(document.getElementById(`imp-batch-${type}`).value) || state.settings.batchSize);
  const batchDelay = Math.max(100, parseInt(document.getElementById(`imp-delay-${type}`).value) || state.settings.batchDelay);
  const maxRetry = Math.max(0, parseInt(document.getElementById(`imp-retry-${type}`).value) || state.settings.maxRetry);
  const parallel = Math.max(1, Math.min(10, parseInt(document.getElementById(`imp-parallel-${type}`).value) || state.settings.parallel));

  document.getElementById(`progress-card-${type}`).style.display = '';
  const logArea = document.getElementById('log-area');
  if (logArea) logArea.innerHTML = '';

  await startImport(state.previewData, type, { batchSize, batchDelay, maxRetry, parallel });
}

async function handleTestApi() {
  const sel = document.getElementById('test-act');
  let act = sel.value === '__custom' ? document.getElementById('test-act-input').value.trim() : sel.value;
  const dataStr = document.getElementById('test-data').value.trim();
  if (!act) { toast('Pilih atau isi method', 'err'); return; }

  let data;
  try {
    data = JSON.parse(dataStr);
  } catch(e) {
    toast('JSON data tidak valid: ' + e.message, 'err');
    return;
  }

  const respEl = document.getElementById('test-response');
  const btn = document.getElementById('btn-test-send');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner spin"></i> Mengirim...';
  respEl.textContent = 'Mengirim request...';
  respEl.style.color = 'var(--info)';

  // Untuk GetToken, gunakan token kosong
  const token = act === 'GetToken' ? '' : state.token;

  try {
    const body = { act, token, data };
    const res = await fetch(state.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const json = await res.json();
    respEl.textContent = JSON.stringify(json, null, 2);
    respEl.style.color = (json.error_code === '0' || json.status === 'ok' || json.token) ? 'var(--ok)' : 'var(--err)';

    // Auto save token jika GetToken
    if (act === 'GetToken' && json.token) {
      state.token = json.token;
      save(SK.token, state.token);
      updateAuthUI();
      toast('Token diperbarui dari Test API', 'ok');
    }
  } catch(e) {
    respEl.textContent = 'ERROR: ' + e.message;
    respEl.style.color = 'var(--err)';
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Kirim Request';
}

function navigateTo(page) {
  state.page = page;
  state.previewData = [];
  state.previewType = '';
  state.importing = false;

  // Update sidebar active
  document.querySelectorAll('.sidebar-link').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });

  // Update navbar
  const item = menuItems.find(m => m.id === page);
  document.getElementById('page-title').textContent = item?.label || 'Neo Feeder';
  document.getElementById('page-subtitle').textContent = item?.group ? `${item.group} > ${item.label}` : 'Atur koneksi ke server Neo Feeder';

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');

  // Render page
  const pc = document.getElementById('page-container');
  pc.innerHTML = '';
  pc.scrollTop = 0;

  if (importCfg[page]) renderImportPage(page);
  else if (page === 'config') renderConfigPage();
  else if (page === 'testapi') renderTestApiPage();
  else if (page === 'reference') renderReferencePage();
}

function initSidebar() {
  const nav = document.getElementById('sidebar-nav');
  let html = '';
  let lastGroup = null;
  for (const item of menuItems) {
    if (item.group && item.group !== lastGroup) {
      html += `<div class="sidebar-group">${item.group}</div>`;
      lastGroup = item.group;
    }
    html += `<div class="sidebar-link ${item.id === state.page ? 'active' : ''}" data-page="${item.id}" onclick="navigateTo('${item.id}')">
      <i class="fa-solid ${item.icon} w-5 text-center text-sm"></i>
      <span>${item.label}</span>
    </div>`;
  }
  nav.innerHTML = html;
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

document.getElementById('overlay').onclick = () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
};

function toggleTheme() {
  state.darkMode = !state.darkMode;
  document.body.classList.toggle('light', !state.darkMode);
  const icon = document.getElementById('theme-icon');
  icon.className = state.darkMode ? 'fa-solid fa-moon text-sm' : 'fa-solid fa-sun text-sm';
  icon.style.color = state.darkMode ? 'var(--tx2)' : 'var(--accent)';
  save(SK.dark, String(state.darkMode));
}

// ==========================================
// AUTO LOGIN
// ==========================================

async function autoLogin() {
  if (state.token && state.username && state.password) {
    // Coba ambil token baru secara diam-diam
    try {
      const res = await requestNeo('GetToken', { username: state.username, password: state.password });
      if (res.token) {
        state.token = res.token;
        save(SK.token, state.token);
        updateAuthUI();
      }
    } catch(e) {
      // Token lama masih bisa dipakai, abaikan error
    }
  } else if (state.username && state.password && !state.token) {
    // Auto login jika ada kredensial tapi belum ada token
    try {
      const res = await requestNeo('GetToken', { username: state.username, password: state.password });
      if (res.token) {
        state.token = res.token;
        save(SK.token, state.token);
        updateAuthUI();
        toast('Auto login berhasil', 'ok');
      }
    } catch(e) {
      // Gagal auto login, biarkan user login manual
    }
  }
}

// ==========================================
// KEYBOARD SHORTCUTS
// ==========================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ==========================================
// INISIALISASI
// ==========================================
function init() {
  loadState();

  // Apply theme
  document.body.classList.toggle('light', !state.darkMode);
  const icon = document.getElementById('theme-icon');
  icon.className = state.darkMode ? 'fa-solid fa-moon text-sm' : 'fa-solid fa-sun text-sm';
  icon.style.color = state.darkMode ? 'var(--tx2)' : 'var(--accent)';

  initSidebar();
  updateAuthUI();
  navigateTo(state.page);

  // Auto login di background
  if (state.username && state.password) {
    autoLogin();
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
