<head>
<meta charset="UTF-8">

<title>Neo Feeder — Dashboard Akademik</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{fontFamily:{display:['Space Grotesk','sans-serif'],body:['Plus Jakarta Sans','sans-serif']}}}}
</script>
<style>
:root{
  --bg:#f4f7fa;--card:#ffffff;--card-b:#dfe6ee;
  --tx:#0f172a;--tx2:#64748b;--bdr:#e2e8f0;
  --acc:#10b981;--acc-d:#059669;--acc-dd:#047857;
  --sb1:#021a12;--sb2:#0a2e1f;--sb3:#0f3d2a;
}
.dark{
  --bg:#0f172a;--card:#1a2332;--card-b:#2a3a4a;
  --tx:#e2e8f0;--tx2:#94a3b8;--bdr:#1e2d3d;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
.dark ::-webkit-scrollbar-thumb{background:#334155}

.sb{width:260px;background:linear-gradient(180deg,var(--sb1),var(--sb2) 50%,var(--sb3));position:fixed;top:0;left:0;bottom:0;z-index:40;overflow-y:auto;overflow-x:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sb.cl{transform:translateX(-260px)}
.sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
.sb-mi{display:flex;align-items:center;padding:8px 14px;margin:1px 8px;border-radius:8px;cursor:pointer;transition:all .15s;color:rgba(209,250,229,.45);font-size:12.5px;font-weight:500;gap:10px;user-select:none}
.sb-mi:hover{background:rgba(255,255,255,.06);color:#d1fae5}
.sb-mi.act{background:rgba(16,185,129,.12);color:#ecfdf5;box-shadow:inset 3px 0 0 var(--acc)}
.sb-mi .mi-i{font-size:18px;flex-shrink:0}
.sb-mi .mi-l{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-mi .mi-a{font-size:16px;transition:transform .2s;opacity:.3;flex-shrink:0}
.sb-mi .mi-a.op{transform:rotate(180deg);opacity:.8}
.sb-sub{max-height:0;overflow:hidden;transition:max-height .3s ease}
.sb-sub.op{max-height:600px}
.sb-sub a{display:flex;align-items:center;padding:6px 14px 6px 48px;font-size:11.5px;color:rgba(209,250,229,.28);border-radius:6px;transition:all .12s;cursor:pointer;text-decoration:none;gap:7px;margin:0 8px}
.sb-sub a:hover{color:#d1fae5;background:rgba(255,255,255,.04)}
.sb-sub a.act{color:var(--acc);background:rgba(16,185,129,.08)}
.sb-sub a .dt{width:4px;height:4px;border-radius:50%;background:rgba(209,250,229,.12);flex-shrink:0}
.sb-sub a.act .dt{background:var(--acc)}

.mw{margin-left:260px;transition:margin-left .3s cubic-bezier(.4,0,.2,1);min-height:100vh;display:flex;flex-direction:column}
.mw.fl{margin-left:0}
.hdr{height:56px;background:rgba(255,255,255,.88);backdrop-filter:blur(16px) saturate(1.8);border-bottom:1px solid var(--card-b);position:sticky;top:0;z-index:30;flex-shrink:0;transition:background .3s,border-color .3s}
.dark .hdr{background:rgba(15,23,42,.9)}

/* overlay — hanya untuk backdrop */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:35;backdrop-filter:blur(2px)}
.ov.sh{display:block}

.tg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;white-space:nowrap}
.tg-p{background:#ecfdf5;color:#047857}
.tg-n{background:#fef2f2;color:#dc2626}
.tg-u{background:#f1f5f9;color:#475569}
.dark .tg-p{background:rgba(16,185,129,.1);color:#34d399}
.dark .tg-n{background:rgba(239,68,68,.1);color:#f87171}
.dark .tg-u{background:rgba(100,116,139,.1);color:#94a3b8}

.cd{background:var(--card);border:1px solid var(--card-b);border-radius:12px;padding:18px;transition:box-shadow .2s,background .3s,border-color .3s}
.cd:hover{box-shadow:0 2px 16px rgba(0,0,0,.04)}
.dark .cd:hover{box-shadow:0 2px 20px rgba(0,0,0,.2)}
.sn{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.55rem;line-height:1}
.tw{overflow-x:auto;border:1px solid var(--card-b);border-radius:10px;background:var(--card);transition:background .3s,border-color .3s}
.tw table{width:100%;border-collapse:collapse;font-size:11.5px}
.tw th{background:var(--bg);padding:8px 11px;text-align:left;font-weight:600;color:var(--tx2);border-bottom:2px solid var(--card-b);white-space:nowrap;font-size:10px;text-transform:uppercase;letter-spacing:.4px;transition:background .3s,color .3s}
.tw td{padding:7px 11px;border-bottom:1px solid var(--bdr);color:var(--tx);transition:border-color .3s}
.tw tr:last-child td{border-bottom:none}
.tw tr:hover td{background:var(--bg);transition:background .15s}
.bt{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:600;border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px;font-family:inherit}
.bt-p{background:var(--acc);color:#fff}.bt-p:hover{background:var(--acc-d)}
.bt-g{background:var(--bg);color:var(--tx2);transition:background .3s,color .3s}.bt-g:hover{background:var(--bdr)}
.bt-d{background:#fef2f2;color:#dc2626}.bt-d:hover{background:#fee2e2}
.dark .bt-d{background:rgba(239,68,68,.08);color:#f87171}.dark .bt-d:hover{background:rgba(239,68,68,.15)}
.bt-s{padding:3px 7px;border-radius:5px;font-size:10px;gap:3px}
.bt:disabled{opacity:.35;pointer-events:none}
.sx{display:flex;align-items:center;background:var(--bg);border-radius:8px;padding:4px 10px;gap:6px;border:1.5px solid transparent;transition:all .2s,background .3s}
.sx:focus-within{border-color:var(--acc);background:var(--card);box-shadow:0 0 0 3px rgba(16,185,129,.08)}
.sx input{background:transparent;outline:none;border:none;font-size:11.5px;color:var(--tx);width:100%;font-family:inherit;transition:color .3s}
.sx input::placeholder{color:var(--tx2);opacity:.7}
.pi{animation:pI .22s ease}
@keyframes pI{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pb{height:6px;border-radius:99px;background:var(--bdr);overflow:hidden;transition:background .3s}
.pf{height:100%;border-radius:99px;background:var(--acc);transition:width .8s ease}
.fi{width:100%;padding:7px 10px;font-size:11.5px;border:1.5px solid var(--card-b);border-radius:8px;background:var(--bg);color:var(--tx);outline:none;transition:all .15s,background .3s,border-color .3s,color .3s;font-family:inherit}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(16,185,129,.08);background:var(--card)}
.fi[readonly]{opacity:.55;cursor:not-allowed}
.fl{display:block;font-size:10px;font-weight:600;color:var(--tx2);margin-bottom:3px;transition:color .3s}
.hb{width:32px;height:32px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:all .15s}
.hb .material-icons-outlined{font-size:18px;color:var(--tx2);transition:color .3s}
.hb:hover{background:var(--bdr)}
.iw{width:32px;height:32px;border-radius:10px;background:rgba(16,185,129,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.iw .material-icons-outlined{font-size:16px;color:var(--acc)}
.iw-lg{width:36px;height:36px;border-radius:12px}
.tc{position:fixed;bottom:14px;right:14px;z-index:999;display:flex;flex-direction:column;gap:5px}
.tt{background:#0f172a;color:#fff;padding:9px 14px;border-radius:9px;font-size:11.5px;display:flex;align-items:center;gap:7px;box-shadow:0 6px 24px rgba(0,0,0,.18);animation:tI .25s ease;max-width:300px}
@keyframes tI{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.tt.ou{animation:tO .2s ease forwards}
@keyframes tO{to{opacity:0;transform:translateY(6px) scale(.97)}}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);z-index:50;display:none;align-items:center;justify-content:center}
.mb.sh{display:flex}
.mx{background:var(--card);border-radius:14px;max-width:520px;width:92%;max-height:80vh;overflow-y:auto;animation:mI .22s ease;transition:background .3s}
@keyframes mI{from{opacity:0;transform:scale(.97) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.dd{position:absolute;right:0;top:100%;margin-top:5px;background:var(--card);border:1px solid var(--card-b);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.1);min-width:170px;opacity:0;transform:translateY(-3px);pointer-events:none;transition:all .15s,background .3s,border-color .3s;z-index:50}
.dark .dd{box-shadow:0 8px 30px rgba(0,0,0,.4)}
.dd.sh{opacity:1;transform:translateY(0);pointer-events:auto}
.dd a{display:flex;align-items:center;gap:7px;padding:7px 12px;font-size:11.5px;color:var(--tx2);cursor:pointer;transition:all .1s;text-decoration:none}
.dd a:hover{background:var(--bg);color:var(--tx)}
.dd .dv{border-top:1px solid var(--bdr);margin:3px 0}
.tgl{position:relative;width:36px;height:20px;cursor:pointer;display:inline-block}
.tgl input{opacity:0;width:0;height:0;position:absolute}
.tgl .sl{position:absolute;inset:0;background:#cbd5e1;border-radius:99px;transition:background .2s}
.tgl .sl::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tgl input:checked+.sl{background:var(--acc)}
.tgl input:checked+.sl::after{transform:translateX(16px)}
.dark .tgl .sl{background:#475569}

@media(max-width:1024px){
  .sb{transform:translateX(-260px)}
  .sb.sopen{transform:translateX(0)}
  .mw,.mw.fl{margin-left:0!important}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

        <input placeholder="Cari menu..." id="gS" onkeyup="gsFn(this.value)">

  <main class="p-4 md:p-5 flex-1" id="pg"></main>
  <footer class="px-5 py-2.5 text-center flex-shrink-0" style="border-top:1px solid var(--bdr)">
    <p class="text-[9px]" style="color:var(--tx2)">Neo Feeder v3.0.0 — Universitas Nusantara Mandiri &copy; 2026</p>
  </footer>
</div>

function tbl(id,d,ps){

  else{pr.forEach(function(r,ri){h+='<tr>';r.forEach(function(c,ci){if(bdg[ci]&&bdg[ci][c]){h+='<td><span class="tg '+bdg[ci][c]+'">'+c+'</span></td>'}else{h+='<td>'+c+'</td>'}});if(hasAct){h+='<td><div class="flex gap-1"><button class="bt bt-g bt-s" onclick="sDet(\''+id+'\','+(st+ri)+')" title="Lihat"><span class="material-icons-outlined" style="font-size:12px">visibility</span></button><button class="bt bt-g bt-s" onclick="toast(\'Mode edit\',\'info\')" title="Edit"><span class="material-icons-outlined" style="font-size:12px">edit</span></button><button class="bt bt-d bt-s" onclick="toast(\'Konfirmasi hapus\',\'error\')" title="Hapus"><span class="material-icons-outlined" style="font-size:12px">delete</span></button></div></td>'}h+='</tr>'})}
  h+='</tbody></table></div>';

  return h+'</div>';
}

/* ===== SIDEBAR ===== */
function buildSB(){
  var nav=document.getElementById('sbN'),h='';
  MN.forEach(function(m){
    if(m.sub){
      h+='<div class="sb-mi" onclick="tSub(this)"><span class="material-icons-outlined mi-i">'+m.ico+'</span><span class="mi-l">'+m.lbl+'</span><span class="material-icons-outlined mi-a">expand_more</span></div>';
      h+='<div class="sb-sub">'+m.sub.map(function(s){return '<a data-page="'+s.id+'" onclick="nav(\''+s.id+'\',this)"><span class="dt"></span>'+s.lbl+'</a>'}).join('')+'</div>';
    }else{
      h+='<div class="sb-mi" data-page="'+m.id+'" onclick="nav(\''+m.id+'\',this)"><span class="material-icons-outlined mi-i">'+m.ico+'</span><span class="mi-l">'+m.lbl+'</span></div>';
    }
  });
  nav.innerHTML=h;
}

/* ===== ROUTING ===== */
var curPg='dashboard';
function nav(pid,el){
  document.querySelectorAll('.sb-mi').forEach(function(m){m.classList.remove('act')});
  document.querySelectorAll('.sb-sub a').forEach(function(a){a.classList.remove('act')});
  if(el){if(el.classList.contains('sb-mi')){el.classList.add('act')}else{el.classList.add('act');var pm=el.closest('.sb-sub');if(pm){var mi=pm.previousElementSibling;if(mi)mi.classList.add('act')}}}
  curPg=pid;
  var ae=document.querySelector('[data-page="'+pid+'"]');if(ae)ae.scrollIntoView({behavior:'smooth',block:'nearest'});
  ren();cmob();window.scrollTo({top:0,behavior:'smooth'});
}
function ren(){var c=document.getElementById('pg'),fn=PG[curPg];if(fn){c.innerHTML='<div class="pi">'+fn()+'</div>';if(curPg==='dashboard')setTimeout(aDash,30)}}
function aDash(){
  var el=document.getElementById('pg');if(!el)return;
  el.querySelectorAll('.sn[data-target]').forEach(function(e){var t=parseInt(e.dataset.target),d=1000,s=performance.now();(function u(n){var p=Math.min((n-s)/d,1);e.textContent=Math.round((1-Math.pow(1-p,3))*t).toLocaleString('id-ID');if(p<1)requestAnimationFrame(u)})(s)});
  setTimeout(function(){el.querySelectorAll('.pf').forEach(function(b){b.style.width=b.dataset.w})},80);
}

/* ===== SIDEBAR INTERAKSI — class .sopen untuk mobile, .cl untuk desktop ===== */
function tsb(){
  var sb=document.getElementById('sb'),mw=document.getElementById('mw');
  if(window.innerWidth<=1024){
    /* mobile: toggle class .sopen pada sidebar + .sh pada overlay */
    sb.classList.toggle('sopen');
    document.getElementById('ov').classList.toggle('sh');
  }else{
    /* desktop: toggle collapse */
    sb.classList.toggle('cl');
    mw.classList.toggle('fl');
  }
}
function cmob(){
  document.getElementById('sb').classList.remove('sopen');
  document.getElementById('ov').classList.remove('sh');
}
function tSub(el){var sub=el.nextElementSibling,arr=el.querySelector('.mi-a');document.querySelectorAll('.sb-sub.op').forEach(function(s){if(s!==sub){s.classList.remove('op');s.previousElementSibling.querySelector('.mi-a').classList.remove('op')}});sub.classList.toggle('op');arr.classList.toggle('op')}
