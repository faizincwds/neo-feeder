<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Feeder Importer PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js">
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @import "tailwindcss";
        @theme {
            --font-outfit: 'Outfit', sans-serif;
            --color-accent: #f0a500;
            --color-accent-hover: #c48800;
            --color-accent-glow: rgba(240, 165, 0, 0.12);
        }
    </style>
    <style type="text/css">
        :root {
            --bg: #0c0e14;
            --card: #151822;
            --card2: #1c1f2e;
            --input: #111420;
            --bdr: #252836;
            --bdr2: #333650;
            --tx: #e4e5ea;
            --tx2: #a0a3b5;
            --tx3: #6c7086;
            --accent: #f0a500;
            --accent2: #c48800;
            --glow: rgba(240, 165, 0, 0.12);
            --ok: #10b981;
            --warn: #eab308;
            --err: #ef4444;
            --info: #06b6d4
        }
        body.light {
            --bg: #f3f4f8;
            --card: #ffffff;
            --card2: #f0f1f5;
            --input: #f0f1f5;
            --bdr: #dfe1e8;
            --bdr2: #c8cad3;
            --tx: #1a1d27;
            --tx2: #4a4d5e;
            --tx3: #8a8da0;
            --glow: rgba(240, 165, 0, 0.08)
        }
        * {
            font-family: 'Outfit', sans-serif;
            box-sizing: border-box
        }
        body {
            background: var(--bg);
            color: var(--tx);
            margin: 0;
            min-height: 100vh;
            transition: background .3s, color .3s
        }
        body::before {
            content: '';
            position: fixed;
            top: -250px;
            right: -250px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(240, 165, 0, .05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -300px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(6, 182, 212, .03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0
        }
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px
        }
        ::-webkit-scrollbar-track {
            background: transparent
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bdr2);
            border-radius: 4px
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px)
            }
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0
            }
            to {
                opacity: 1
            }
        }
        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
        @keyframes pulseG {
            0%,
            100% {
                box-shadow: 0 0 8px var(--glow)
            }
            50% {
                box-shadow: 0 0 20px var(--glow)
            }
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1
            }
            50% {
                opacity: .3
            }
        }
        .anim-fade {
            animation: fadeUp .35s ease-out both
        }
        .anim-fade-d1 {
            animation: fadeUp .35s .08s ease-out both
        }
        .anim-fade-d2 {
            animation: fadeUp .35s .16s ease-out both
        }
        .anim-fade-d3 {
            animation: fadeUp .35s .24s ease-out both
        }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            color: var(--tx2);
            transition: all .2s;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            position: relative;
            margin: 2px 0
        }
        .sidebar-link:hover {
            background: rgba(240, 165, 0, .06);
            color: var(--accent)
        }
        .sidebar-link.active {
            background: rgba(240, 165, 0, .1);
            color: var(--accent);
            font-weight: 600
        }
        .sidebar-link.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            background: var(--accent);
            border-radius: 0 3px 3px 0
        }
        .sidebar-group {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--tx3);
            padding: 16px 16px 6px;
            margin-top: 8px
        }
        .sidebar-num {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
            background: var(--card2);
            color: var(--tx3);
            flex-shrink: 0;
            transition: all .15s
        }
        .sidebar-link.active .sidebar-num {
            background: var(--accent);
            color: #0c0e14
        }
        .card {
            background: var(--card);
            border: 1px solid var(--bdr);
            border-radius: 14px;
            transition: border-color .2s
        }
        .card:hover {
            border-color: var(--bdr2)
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all .2s
        }
        .btn:active:not(:disabled) {
            transform: scale(.97)
        }
        .btn-p {
            background: var(--accent);
            color: #0c0e14
        }
        .btn-p:hover:not(:disabled) {
            background: var(--accent2);
            transform: translateY(-1px)
        }
        .btn:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none!important
        }
        .btn-s {
            background: var(--card2);
            color: var(--tx);
            border: 1px solid var(--bdr)
        }
        .btn-s:hover:not(:disabled) {
            background: var(--bdr);
            border-color: var(--bdr2)
        }
        .btn-d {
            background: rgba(239, 68, 68, .12);
            color: var(--err);
            border: 1px solid rgba(239, 68, 68, .2)
        }
        .btn-d:hover:not(:disabled) {
            background: rgba(239, 68, 68, .2)
        }
        .btn-ok {
            background: rgba(16, 185, 129, .12);
            color: var(--ok);
            border: 1px solid rgba(16, 185, 129, .2)
        }
        .btn-ok:hover:not(:disabled) {
            background: rgba(16, 185, 129, .2)
        }
        .ipt {
            width: 100%;
            padding: 10px 14px;
            background: var(--input);
            border: 1px solid var(--bdr);
            border-radius: 10px;
            color: var(--tx);
            font-size: 14px;
            transition: all .2s;
            outline: none;
            font-family: inherit
        }
        .ipt:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--glow)
        }
        .ipt::placeholder {
            color: var(--tx3)
        }
        textarea.ipt {
            resize: vertical;
            min-height: 120px;
            font-family: 'Courier New', monospace;
            font-size: 13px
        }
        .tbl {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px
        }
        .tbl th {
            background: var(--card2);
            color: var(--tx2);
            font-weight: 600;
            padding: 10px 14px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 2;
            border-bottom: 1px solid var(--bdr)
        }
        .tbl td {
            padding: 8px 14px;
            border-bottom: 1px solid var(--bdr);
            color: var(--tx2);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }
        .tbl tr:hover td {
            background: rgba(240, 165, 0, .03)
        }
        .drop-zone {
            border: 2px dashed var(--bdr2);
            border-radius: 14px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all .3s
        }
        .drop-zone:hover,
        .drop-zone.over {
            border-color: var(--accent);
            background: var(--glow)
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600
        }
        .badge-ok {
            background: rgba(16, 185, 129, .12);
            color: var(--ok)
        }
        .badge-warn {
            background: rgba(234, 179, 8, .12);
            color: var(--warn)
        }
        .badge-err {
            background: rgba(239, 68, 68, .12);
            color: var(--err)
        }
        .badge-info {
            background: rgba(6, 182, 212, .12);
            color: var(--info)
        }
        .log-ok {
            color: var(--ok)
        }
        .log-warn {
            color: var(--warn)
        }
        .log-err {
            color: var(--err)
        }
        .log-info {
            color: var(--info)
        }
        .log-retry {
            color: #a78bfa
        }
        .toast-box {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none
        }
        .toast {
            pointer-events: auto;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            animation: fadeUp .3s ease-out;
            backdrop-filter: blur(10px);
            border: 1px solid var(--bdr);
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 420px
        }
        .toast.out {
            animation: fadeIn .25s ease-out reverse both
        }
        .toast-ok {
            background: rgba(16, 185, 129, .15);
            color: var(--ok);
            border-color: rgba(16, 185, 129, .3)
        }
        .toast-err {
            background: rgba(239, 68, 68, .15);
            color: var(--err);
            border-color: rgba(239, 68, 68, .3)
        }
        .toast-warn {
            background: rgba(234, 179, 8, .15);
            color: var(--warn);
            border-color: rgba(234, 179, 8, .3)
        }
        .toast-info {
            background: rgba(6, 182, 212, .15);
            color: var(--info);
            border-color: rgba(6, 182, 212, .3)
        }
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn .2s
        }
        .modal-box {
            background: var(--card);
            border: 1px solid var(--bdr);
            border-radius: 16px;
            max-width: 640px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: fadeUp .3s ease-out
        }
        .progress-track {
            background: var(--card2);
            border-radius: 8px;
            height: 10px;
            overflow: hidden
        }
        .progress-fill {
            height: 100%;
            border-radius: 8px;
            transition: width .4s ease;
            background: linear-gradient(90deg, var(--accent), #fbbf24)
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--bdr);
            border-radius: 12px;
            padding: 16px 20px;
            text-align: center
        }
        .stat-num {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.1
        }
        .stat-lbl {
            font-size: 12px;
            color: var(--tx3);
            margin-top: 4px;
            font-weight: 500
        }
        .spin-anim {
            animation: spin 1s linear infinite
        }
        .conn-pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--ok);
            animation: pulseG 2s ease-in-out infinite;
            display: inline-block
        }
        .conn-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block
        }
        .conn-fail {
            background: var(--err)
        }
        .conn-warn {
            background: var(--warn);
            animation: blink 1s step-end infinite
        }
        .conn-idle {
            background: var(--tx3)
        }
        .conn-ok {
            background: var(--ok)
        }
        .conn-busy {
            background: var(--info);
            animation: blink .8s step-end infinite
        }
        .debug-box {
            background: var(--card2);
            border: 1px solid var(--bdr);
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--tx3);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all
        }
        @media(max-width:768px) {
            .sidebar-wrap {
                position: fixed!important;
                z-index: 500;
                transform: translateX(-100%);
                transition: transform .3s
            }
            .sidebar-wrap.open {
                transform: translateX(0)
            }
            .main-wrap {
                margin-left: 0!important
            }
            .overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, .4);
                z-index: 499
            }
            .overlay.show {
                display: block
            }
        }
    </style>
</head>
<body>

    <div class="toast-box" id="toasts"></div>
    <div class="overlay" id="overlay"></div>
    <div class="flex min-h-screen relative" style="z-index:1">
        <aside class="sidebar-wrap w-[260px] min-w-[260px] h-screen sticky top-0 flex flex-col border-r" id="sidebar"
        style="background:var(--card);border-color:var(--bdr)">
        <div class="p-5 flex items-center gap-3 border-b" style="border-color:var(--bdr)">
            <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:var(--accent)"><i
            class="fa-solid fa-bolt text-sm" style="color:#0c0e14"></i></div>
            <div>
                <div class="font-bold text-sm" style="color:var(--tx)">Neo Feeder</div>
                <div class="text-[11px] font-semibold" style="color:var(--accent)">Importer PRO</div>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto py-2 px-3" id="sidebar-nav"></nav>
        <div class="p-4 border-t" style="border-color:var(--bdr)" id="sidebar-footer"></div>
    </aside>
    <div class="main-wrap flex-1 flex flex-col min-h-screen">
        <header class="sticky top-0 z-40 border-b flex items-center gap-4 px-5 h-[60px]"
        style="background:var(--card);border-color:var(--bdr);backdrop-filter:blur(12px)">
        <button class="md:hidden w-9 h-9 flex items-center justify-center rounded-lg" style="background:var(--card2)"
        onclick="toggleSidebar()"><i class="fa-solid fa-bars text-sm" style="color:var(--tx2)"></i></button>
        <div class="flex-1">
            <h1 class="text-sm font-bold" id="page-title" style="color:var(--tx)">Konfigurasi API</h1>
            <p class="text-[11px]" id="page-subtitle" style="color:var(--tx3)">Atur koneksi ke server Neo Feeder</p>
        </div>
        <div class="flex items-center gap-3" id="header-status"></div>
    </header>
    <main class="flex-1 p-5 md:p-6 relative" style="z-index:1" id="page-container"></main>
</div>
</div>
<div id="modal-root"></div>

<script>
    var DEFAULT_URL = 'http://localhost:3003/ws/live2.php';
    var SK = { url: 'nf_url', user: 'nf_user', pass: 'nf_pass', token: 'nf_token', settings: 'nf_settings',
        dark: 'nf_dark' };

    var menuItems = [
        { id: 'config', label: 'Konfigurasi API', icon: 'fa-gear', group: null },
        { id: 'dosen', label: 'Dosen', icon: 'fa-chalkboard-user', group: 'Import Data', ord: 1 },
        { id: 'mahasiswa', label: 'Mahasiswa', icon: 'fa-user-graduate', group: 'Import Data', ord: 2 },
        { id: 'kelas', label: 'Kelas Kuliah', icon: 'fa-door-open', group: 'Import Data', ord: 3 },
        { id: 'pengajar', label: 'Pengajar Kelas', icon: 'fa-person-chalkboard', group: 'Import Data', ord: 4 },
        { id: 'jadwal', label: 'Jadwal Kuliah', icon: 'fa-calendar-days', group: 'Import Data', ord: 5 },
        { id: 'krs', label: 'KRS', icon: 'fa-list-check', group: 'Import Data', ord: 6 },
        { id: 'khs', label: 'KHS', icon: 'fa-file-lines', group: 'Import Data', ord: 7 },
        { id: 'akm', label: 'AKM', icon: 'fa-chart-line', group: 'Import Data', ord: 8 },
        { id: 'aktivitas', label: 'Aktivitas', icon: 'fa-person-running', group: 'Import Data', ord: 9 },
        { id: 'peserta', label: 'Peserta Aktivitas', icon: 'fa-users', group: 'Import Data', ord: 10 },
        { id: 'kelulusan', label: 'Kelulusan', icon: 'fa-graduation-cap', group: 'Import Data', ord: 11 },
        { id: 'testapi', label: 'Test API', icon: 'fa-flask-vial', group: 'Alat Bantu' },
        { id: 'reference', label: 'Reference WS', icon: 'fa-book-open', group: 'Alat Bantu' },
    ];

    // Build icon lookup dari menuItems (untuk importCfg)
    var menuIconMap = {};
    menuItems.forEach(function(m) { if (m.id) menuIconMap[m.id] = m.icon; });

    var importCfg = {
        dosen: { method: 'InsertBiodataDosen', keyFields: ['nidn'], label: 'Dosen',
            desc: 'Import data biodata dosen', icon: menuIconMap['dosen'] || 'fa-chalkboard-user' },
        mahasiswa: { method: 'InsertMahasiswa', keyFields: ['nim'], label: 'Mahasiswa',
            desc: 'Import data mahasiswa baru', icon: menuIconMap['mahasiswa'] || 'fa-user-graduate' },
        kelas: { method: 'InsertKelasKuliah', keyFields: ['id_kelas_kuliah'], label: 'Kelas Kuliah',
            desc: 'Import data kelas kuliah', icon: menuIconMap['kelas'] || 'fa-door-open' },
        pengajar: { method: 'InsertDosenPengajarKelasKuliah', keyFields: ['id_kelas_kuliah', 'nidn'],
            label: 'Pengajar Kelas', desc: 'Import dosen pengajar kelas', icon: menuIconMap['pengajar'] ||
                'fa-person-chalkboard' },
        jadwal: { method: 'InsertJadwalKuliah', keyFields: ['id_kelas_kuliah', 'id_ruang', 'id_waktu'],
            label: 'Jadwal Kuliah', desc: 'Import jadwal perkuliahan', icon: menuIconMap['jadwal'] || 'fa-calendar-days' },
        krs: { method: 'InsertKRS', keyFields: ['id_kelas_kuliah', 'nim'], label: 'KRS',
            desc: 'Import Kartu Rencana Studi', icon: menuIconMap['krs'] || 'fa-list-check' },
        khs: { method: 'InsertKHS', keyFields: ['id_kelas_kuliah', 'nim'], label: 'KHS',
            desc: 'Import Kartu Hasil Studi', icon: menuIconMap['khs'] || 'fa-file-lines' },
        akm: { method: 'InsertAKM', keyFields: ['nim', 'id_periode'], label: 'AKM',
            desc: 'Import Aktivitas Kemahasiswaan', icon: menuIconMap['akm'] || 'fa-chart-line' },
        aktivitas: { method: 'InsertAktivitasMahasiswa', keyFields: ['id_aktivitas'], label: 'Aktivitas',
            desc: 'Import data aktivitas mahasiswa', icon: menuIconMap['aktivitas'] || 'fa-person-running' },
        peserta: { method: 'InsertPesertaAktivitasMahasiswa', keyFields: ['id_aktivitas', 'nim'],
            label: 'Peserta Aktivitas', desc: 'Import peserta aktivitas', icon: menuIconMap['peserta'] || 'fa-users' },
        kelulusan: { method: 'InsertKelulusanMahasiswa', keyFields: ['nim'], label: 'Kelulusan',
            desc: 'Import data kelulusan mahasiswa', icon: menuIconMap['kelulusan'] || 'fa-graduation-cap' },
    };

    var methodToType = {};
    Object.keys(importCfg).forEach(function(k) { methodToType[importCfg[k].method] = k; });

    var wsDocs = {
        GetToken: {
            desc: 'Mendapatkan token. Username dan password dikirim di ROOT body, bukan di dalam data.',
            fields: [{ name: 'username', type: 'string', req: true, desc: 'Username akun Neo Feeder' }, { name: 'password',
                type: 'string', req: true, desc: 'Password akun Neo Feeder' }],
            example: { username: 'admin', password: 'password123' }
        },
        InsertBiodataDosen: {
            desc: 'Menambahkan data biodata dosen.',
            fields: [{ name: 'nidn', type: 'string', req: true, desc: 'NIDN (unik)' }, { name: 'nama_dosen', type: 'string',
                req: true, desc: 'Nama lengkap' }, { name: 'jenis_kelamin', type: 'string', req: true,
            desc: 'L / P' }, { name: 'id_prodi', type: 'string', req: true, desc: 'Kode prodi' },
            { name: 'id_status_aktif', type: 'string', req: false, desc: 'Status aktif' }],
            example: { nidn: '0012345678', nama_dosen: 'Dr. Ahmad Fauzi, M.Kom', jenis_kelamin: 'L',
                id_prodi: 'A1B2C3D4', id_status_aktif: 'A' }
        },
        InsertMahasiswa: {
            desc: 'Menambahkan data mahasiswa baru.',
            fields: [{ name: 'nim', type: 'string', req: true, desc: 'NIM (unik)' }, { name: 'nama_mahasiswa',
                type: 'string', req: true, desc: 'Nama lengkap' }, { name: 'id_prodi', type: 'string', req: true,
                desc: 'Kode prodi' }, { name: 'id_periode_masuk', type: 'string', req: true, desc: 'Periode masuk' }],
            example: { nim: '2024001', nama_mahasiswa: 'Budi Santoso', id_prodi: 'A1B2C3D4', id_periode_masuk: '20241' }
        },
        InsertKelasKuliah: {
            desc: 'Menambahkan kelas kuliah.',
            fields: [{ name: 'id_kelas_kuliah', type: 'string', req: true, desc: 'ID unik kelas' },
            { name: 'nama_kelas_kuliah', type: 'string', req: true, desc: 'Nama kelas' }, { name: 'id_matkul',
                type: 'string', req: true, desc: 'Kode matkul' }, { name: 'id_prodi', type: 'string', req: true,

    /* -------------------- STATE PERSISTENCE -------------------- */
    function loadState() {

    function isTokenExpired(res) {
        if (!res) return false;
        var desc = (res.error_desc || '').toLowerCase();
        return desc.includes('token') && (desc.includes('exp') || desc.includes('kadaluarsa') || desc.includes('tidak valid'));
    }

    function clearToken() {
        state.token = '';
        localStorage.removeItem(SK.token);
        state.conn.status = 'idle';
        state.conn.msg = 'Token tidak valid atau expired';
        stopConnCheck();
        updateAuthUI();
        updateHeaderStatus();
        toast('Token expired, silakan login ulang', 'err');

    /* -------------------- API & NETWORK -------------------- */
    async function requestNeo(act, data) {
        var body;
        if (act === 'GetToken') {
            body = { act: 'GetToken', token: '', username: data.username || '', password: data.password || '' };
        } else {
            body = { act: act, token: state.token || '', data: data };
        }
        addDebug('REQUEST → ' + state.apiUrl, JSON.stringify(body, null, 2));
        var res = await fetch(state.apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + res.statusText);
        var json = await res.json();

        // Pengecekan token expired untuk semua response (selain GetToken)
        if (act !== 'GetToken' && isTokenExpired(json)) {
            clearToken();
            throw new Error('Token expired');
        }

        addDebug('RESPONSE ←', JSON.stringify(json, null, 2));

        if (act === 'GetToken') {
            var token = json?.data?.token || json?.token;
            if (token) {
                state.token = token;
                sv(SK.token, token);
                updateAuthUI();
                startConnCheck();
            }
        }

        return json;
    }

    function isDuplicateError(input) {
        if (!input) return false;
        var s = (typeof input === 'string' ? input : JSON.stringify(input)).toLowerCase();
        return ['sudah ada', 'duplicate', 'exists', 'duplikat', 'sudah terdaftar', 'already exist', 'telah terdaftar'].some(
            function(k) { return s.includes(k); });
    }

    async function requestWithRetry(act, data, maxRetry) {
        var delays = [1000, 2000, 3000],
            lastErr = null;
        for (var i = 0; i <= maxRetry; i++) {
            try {
                var res = await requestNeo(act, data);
                if (isDuplicateError(res)) return { _skip: true, _res: res };
                if (res.error_code && String(res.error_code) !== '0') throw new Error(res.error_desc || res.message ||
                    'Error code: ' + res.error_code);
                if (res.error) throw new Error(typeof res.error === 'string' ? res.error : JSON.stringify(res.error));
                if (res.status === 'error' || res.status === 'gagal' || res.status === 'fail') throw new Error(res
                    .message || res.pesan || 'Status: ' + res.status);
                return { _ok: true, _res: res };
            } catch (e) {
                lastErr = e;
                if (isDuplicateError(e.message)) return { _skip: true, _err: e.message };
                if (i < maxRetry) {
                    addLog('RETRY ' + (i + 1) + '/' + maxRetry + ': ' + e.message, 'retry');
                    await sleep(delays[Math.min(i, delays.length - 1)]);
                }
            }
        }
        throw lastErr;
    }

    /* -------------------- IMPORT LOGIC -------------------- */
    function getKeyFields(type) { return importCfg[type] ? importCfg[type].keyFields : []; }

    function removeDuplicate(data, type) {
        var keys = getKeyFields(type);
        if (!keys.length) return { filtered: data, removed: 0 };
        var seen = new Set(),
            filtered = [],
            removed = 0;
        for (var i = 0; i < data.length; i++) {
            var item = data[i],
                kv = keys.map(function(k) { return String(item[k] || ''); }).join('||');
            if (seen.has(kv)) {
                removed++;
                addLog('DUPLIKAT LOKAL: ' + keys.map(function(k) { return k + '=' + item[k]; }).join(', '), 'warn');
            } else { seen.add(kv);
                filtered.push(item); }
        }
        return { filtered: filtered, removed: removed };
    }

    function countDuplicate(data, type) {
        var keys = getKeyFields(type);
        if (!keys.length) return 0;
        var seen = new Set(),
            c = 0;
        for (var i = 0; i < data.length; i++) {
            var kv = keys.map(function(k) { return String(data[i][k] || ''); }).join('||');
            if (seen.has(kv)) c++;
            seen.add(kv);
        }
        return c;
    }

    function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

    async function startImport(data, type, opts) {
        if (state.importing) return;
        if (!state.token) { toast('Token belum tersedia. Login dulu.', 'err'); return; }
        var method = importCfg[type].method,
            dedup = removeDuplicate(data, type);
        if (!dedup.filtered.length) { toast('Tidak ada data setelah deduplikasi.', 'warn'); return; }
        state.importing = true;
        state.cancelRequested = false;
        state.progress = { total: dedup.filtered.length, success: 0, failed: 0, skipped: dedup.removed, current: 0 };
        state.failedData = [];
        showProgressCard();
        updateProgressUI();
        addLog('=== IMPORT ' + importCfg[type].label + ' ===', 'info');
        addLog('Total: ' + data.length + ', Duplikat lokal: ' + dedup.removed + ', Diproses: ' + dedup.filtered.length,
            'info');
        addLog('Batch: ' + opts.batchSize + ', Delay: ' + opts.batchDelay + 'ms, Retry: ' + opts.maxRetry +
            'x, Parallel: ' + opts.parallel, 'info');
        var batches = [];
        for (var i = 0; i < dedup.filtered.length; i += opts.batchSize) batches.push(dedup.filtered.slice(i, i + opts
            .batchSize));
        var conc = Math.max(1, Math.min(opts.parallel, 10));
        for (var bi = 0; bi < batches.length; bi++) {
            if (state.cancelRequested) { addLog('Dibatalkan.', 'warn'); break; }
            var batch = batches[bi],
                results = await runParallel(batch, conc, method, type, opts.maxRetry);
            for (var ri = 0; ri < results.length; ri++) {
                var r = results[ri];
                if (r._skip) { state.progress.skipped++;
                    addLog('SKIP SERVER: ' + (r._key || '-'), 'warn'); } else if (r._ok) { state.progress.success++; } else {
                    state.progress.failed++;
                    state.failedData.push(r._item);
                    addLog('GAGAL: ' + r._err, 'err'); }
            }
            state.progress.current += batch.length;
            updateProgressUI();
            if (bi < batches.length - 1) await sleep(opts.batchDelay);
        }
        state.importing = false;
        addLog('=== SELESAI === Sukses: ' + state.progress.success + ', Gagal: ' + state.progress.failed + ', Skip: ' +
            state.progress.skipped, 'info');
        toast('Import selesai! Sukses: ' + state.progress.success + ', Gagal: ' + state.progress.failed, state.progress
            .failed ? 'warn' : 'ok');
        updateFailedBtn(type);
    }

    async function runParallel(items, conc, method, type, maxRetry) {
        var results = [],
            executing = new Set();
        for (var i = 0; i < items.length; i++) {
            if (state.cancelRequested) break;
            var item = items[i];
            var p = processOneItem(item, method, type, maxRetry).then(function(r) { executing.delete(p); return r; });
            executing.add(p);
            results.push(p);
            if (executing.size >= conc) await Promise.race(executing);
        }
        return Promise.all(results);
    }

    async function processOneItem(item, method, type, maxRetry) {
        var keys = getKeyFields(type),
            keyStr = keys.map(function(k) { return k + '=' + item[k]; }).join(', ');
        try {
            var res = await requestWithRetry(method, item, maxRetry);
            if (res._skip) return { _skip: true, _key: keyStr };
            addLog('OK: ' + keyStr, 'ok');
            return { _ok: true };
        } catch (e) { return { _ok: false, _item: item, _err: e.message }; }
    }

        addLog('Permintaan pembatalan...', 'warn'); }

    /* -------------------- FILE PARSING -------------------- */
    function parseFile(file) {
        var ext = file.name.split('.').pop().toLowerCase();
        if (ext === 'json') return new Promise(function(ok, no) {
            var r = new FileReader();
            r.onload = function(e) {
                try { var d = JSON.parse(e.target.result); if (!Array.isArray(d)) d = [d];
                    ok(d); } catch (x) { no(new Error('JSON tidak valid: ' + x.message)); } };
            r.onerror = function() { no(new Error('Gagal membaca file')); };
            r.readAsText(file);
        });
        if (ext === 'csv') return new Promise(function(ok, no) {
            var r = new FileReader();
            r.onload = function(e) {
                try {
                    var lines = parseCSVLines(e.target.result);
                    if (lines.length < 2) { ok([]); return; }
                    var h = lines[0].map(function(x) { return x.trim(); });
                    var d = [];
                    for (var i = 1; i < lines.length; i++) { var o = {};
                        h.forEach(function(hh, idx) { o[hh] = (lines[i][idx] || '').trim(); });
                        d.push(o); }
                    ok(d);
                } catch (x) { no(new Error('CSV tidak valid: ' + x.message)); } };
            r.onerror = function() { no(new Error('Gagal membaca file')); };
            r.readAsText(file);
        });
        if (ext === 'xlsx' || ext === 'xls') return new Promise(function(ok, no) {
            var r = new FileReader();
            r.onload = function(e) {
                try { var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                    ok(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' })); } catch (x) { no(new Error(
                        'Excel tidak valid: ' + x.message)); } };
            r.onerror = function() { no(new Error('Gagal membaca file')); };
            r.readAsArrayBuffer(file);
        });
        return Promise.reject(new Error('Format tidak didukung. Gunakan JSON, CSV, atau Excel (.xlsx/.xls).'));
    }

    function parseCSVLines(text) {
        var lines = [],
            cur = [],
            field = '',
            inQ = false;
        for (var i = 0; i < text.length; i++) {
            var ch = text[i];
            if (inQ) { if (ch === '"' && text[i + 1] === '"') { field += '"';
                    i++; } else if (ch === '"') inQ = false;
                else field += ch; } else { if (ch === '"') inQ = true;
                else if (ch === ',') { cur.push(field);
                    field = ''; } else if (ch === '\r' && text[i + 1] === '\n') { cur.push(field);
                    field = '';
                    lines.push(cur);
                    cur = [];
                    i++; } else if (ch === '\n') { cur.push(field);
                    field = '';
                    lines.push(cur);
                    cur = []; } else field += ch; }
        }
        if (field || cur.length) { cur.push(field);
            lines.push(cur); }
        return lines;
    }

    /* -------------------- DOM HELPERS -------------------- */
    function $(id) { return document.getElementById(id); }

    function esc(s) { var d = document.createElement('div');
        d.textContent = s; return d.innerHTML; }

    function toast(msg, type) {
        var c = $('toasts'),
            icons = { ok: 'fa-check-circle', err: 'fa-times-circle', warn: 'fa-exclamation-triangle',
                info: 'fa-info-circle' };
        var el = document.createElement('div');
        el.className = 'toast toast-' + (type || 'info');
        el.innerHTML = '<i class="fa-solid ' + (icons[type] || icons.info) + '"></i><span>' + esc(msg) + '</span>';
        c.appendChild(el);
        setTimeout(function() { el.classList.add('out');
            setTimeout(function() { el.remove(); }, 300); }, 3500);
    }

    function addLog(msg, type) {
        state.logs.push({ msg: msg, type: type || 'info', time: new Date().toISOString() });
        if (state.logs.length > 1000) state.logs = state.logs.slice(-500);
        var el = $('log-area');
        if (!el) return;
        var d = new Date(),
            ts = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ':' + String(d
                .getSeconds()).padStart(2, '0');
        el.innerHTML += '<div class="log-' + (type || 'info') + ' text-xs py-0.5 font-mono">[' + ts + '] ' + esc(msg) +
            '</div>';
        el.scrollTop = el.scrollHeight;
    }

                    .getSeconds()).padStart(2, '0') + '.' + String(d.getMilliseconds()).padStart(3, '0');

    function renderTable(data, container, limit) {
        if (!data.length) {
            container.innerHTML =
                '<div class="text-center py-8" style="color:var(--tx3)"><i class="fa-solid fa-inbox text-3xl mb-3 block"></i>Tidak ada data</div>';
            return;
        }
        var show = data.slice(0, limit || 50),
            cols = Object.keys(show[0]);
        var h =
            '<div class="overflow-auto rounded-xl border" style="border-color:var(--bdr);max-height:360px"><table class="tbl"><thead><tr><th class="text-xs" style="color:var(--tx3)">#</th>';
        for (var ci = 0; ci < cols.length; ci++) h += '<th class="text-xs">' + esc(cols[ci]) + '</th>';
        h += '</tr></thead><tbody>';
        for (var ri = 0; ri < show.length; ri++) {
            h += '<tr><td style="color:var(--tx3)">' + (ri + 1) + '</td>';
            for (var ci2 = 0; ci2 < cols.length; ci2++) { var val = show[ri][cols[ci2]];
                h += '<td title="' + esc(String(val == null ? '' : val)) + '">' + esc(String(val == null ? '' : val)) +
                    '</td>'; }
            h += '</tr>';
        }
        h += '</tbody></table></div>';
        if (data.length > (limit || 50)) h += '<div class="text-xs mt-2 text-center" style="color:var(--tx3)">Menampilkan ' + (
            limit || 50) + ' dari ' + data.length + ' data</div>';
        container.innerHTML = h;
    }

    function downloadJSON(data, filename) { var b = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }),
            a = document.createElement('a');

        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href); }

    function downloadText(text, filename) { var b = new Blob([text], { type: 'text/plain' }),
            a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href); }

    /* -------------------- STATUS KONEKSI -------------------- */
    function startConnCheck() {
        stopConnCheck();
        state.conn.status = 'connecting';
        updateHeaderStatus();
        connCheck();
    }

    function stopConnCheck() {
        if (state.conn.checkTimer) { clearTimeout(state.conn.checkTimer);
            state.conn.checkTimer = null; }
    }

    function connCheck() {
        stopConnCheck();
        state.conn.checkTimer = setTimeout(function() { connCheck(); }, 30000);
        if (!state.token) {
            state.conn.status = 'idle';
            state.conn.msg = 'Belum login';
            updateHeaderStatus();
            return;
        }

        state.conn.status = 'ok';
        state.conn.lastCheck = Date.now();
        updateHeaderStatus();
        return;

    async function handleLogin() {

        const url  = $('cfg-url')?.value?.trim()  || state.apiUrl;
        const user = $('cfg-user')?.value?.trim() || state.username;
        const pass = $('cfg-pass')?.value?.trim() || state.password;

        if (!url) { toast('URL endpoint wajib diisi', 'err'); return; }
        if (!user) { toast('Username wajib diisi', 'err'); return; }
        if (!pass) { toast('Password wajib diisi', 'err'); return; }

        state.apiUrl = url;
        state.username = user;
        state.password = pass;

        var btn = $('btn-login');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner spin-anim"></i> Mengambil token...';
        try {
            await requestNeo('GetToken', { username: user, password: pass });
            if (state.token) {
                toast('Login berhasil! Token aktif dan tersimpan.', 'ok');
            } else {
                toast('Gagal mendapatkan token. Periksa kredensial atau response server.', 'err');

            }
        } catch (e) {
            toast('Gagal menghubungi server: ' + e.message, 'err');
            addLog('Koneksi gagal: ' + e.message, 'err');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login & Ambil Token';
            saveAll();
            renderConfigPage();
        }
    }

        state.apiUrl = $('cfg-url').value.trim() || DEFAULT_URL;

    function showMethodDetail(method) {
        var doc = wsDocs[method];
        if (!doc) return;
        var payload = method === 'GetToken' ?
            { act: 'GetToken', token: '', username: 'admin', password: 'password123' } :
            { act: method, token: 'TOKEN_ANDA', data: doc.example };
        var req = doc.fields.filter(function(f) { return f.req; }),
            opt = doc.fields.filter(function(f) { return !f.req; });
        var payloadStr = JSON.stringify(JSON.stringify(payload));
        $('modal-root').innerHTML =
            '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal-box p-6"><div class="flex items-center justify-between mb-4"><h2 class="text-lg font-bold" style="color:var(--accent)">' +
            method +
            '</h2><button class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:var(--card2);color:var(--tx3)" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button></div><p class="text-sm mb-4" style="color:var(--tx2)">' +
            doc.desc + (method === 'GetToken' ? ' (username & password di root body)' : '') +
            '</p><h3 class="text-xs font-bold uppercase tracking-wider mb-2" style="color:var(--tx3)">Field Wajib</h3><div class="space-y-1.5 mb-4">' +
            (req.length ? req.map(function(f) {
                return '<div class="flex items-center gap-2 text-xs p-2 rounded-lg" style="background:var(--input)"><span class="badge badge-warn text-[10px]">wajib</span><code class="font-mono font-semibold" style="color:var(--tx)">' +
                    f.name + '</code><span style="color:var(--tx3)">(' + f.type +
                    ')</span><span class="ml-auto" style="color:var(--tx3)">' + f.desc + '</span></div>';
            }).join('') : '<div class="text-xs" style="color:var(--tx3)">Tidak ada</div>') + '</div>' +
            (opt.length ? '<h3 class="text-xs font-bold uppercase tracking-wider mb-2" style="color:var(--tx3)">Field Opsional</h3><div class="space-y-1.5 mb-4">' +
                opt.map(function(f) {
                    return '<div class="flex items-center gap-2 text-xs p-2 rounded-lg" style="background:var(--input)"><span class="badge badge-info text-[10px]">opsional</span><code class="font-mono" style="color:var(--tx2)">' +
                        f.name + '</code><span style="color:var(--tx3)">(' + f.type +
                        ')</span><span class="ml-auto" style="color:var(--tx3)">' + f.desc + '</span></div>';
                }).join('') + '</div>' : '') +
            '<h3 class="text-xs font-bold uppercase tracking-wider mb-2" style="color:var(--tx3)">Contoh Payload Lengkap</h3><div class="relative"><pre class="p-4 rounded-lg text-xs font-mono overflow-auto" style="background:var(--input);border:1px solid var(--bdr);max-height:280px;color:var(--tx2);white-space:pre-wrap">' +
            esc(JSON.stringify(payload, null, 2)) +
            '</pre><button class="absolute top-2 right-2 btn btn-s text-xs py-1 px-2" onclick="navigator.clipboard.writeText(' +
            payloadStr +
            ').then(function(){toast(\'JSON disalin\', \'ok\');})"><i class="fa-solid fa-copy"></i></button></div></div><div class="flex gap-2 mt-4"><button class="btn btn-p text-sm flex-1" onclick="quickUse(\'' +
            method + '\')"><i class="fa-solid fa-rocket"></i> Gunakan Method</button></div></div></div>';
    }

    function closeModal() { $('modal-root').innerHTML = ''; }

    function quickUse(method) {
        closeModal();
        if (method === 'GetToken') { navigateTo('config'); return; }
        navigateTo(methodToType[method] || 'testapi');
    }

    /* -------------------- NAVIGASI -------------------- */
    function navigateTo(page) {
        state.page = page;
        state.previewData = [];
        state.previewType = '';
        state.importing = false;
        state.cancelRequested = false;
        document.querySelectorAll('.sidebar-link').forEach(function(el) {
            el.classList.toggle('active', el.dataset.page === page);
        });
        var item = menuItems.find(function(m) { return m.id === page; });
        $('page-title').textContent = item ? item.label : 'Neo Feeder';
        $('page-subtitle').textContent = item && item.group ? item.group + ' > ' + item.label :
            'Atur koneksi ke server Neo Feeder';
        $('sidebar').classList.remove('open');
        $('overlay').classList.remove('show');
        var pc = $('page-container');
        pc.innerHTML = '';
        if (importCfg[page]) renderImportPage(page);
        else if (page === 'config') renderConfigPage();
        else if (page === 'testapi') renderTestApiPage();
        else if (page === 'reference') renderReferencePage();
    }

    function initSidebar() {
        var nav = $('sidebar-nav'),
            html = '',
            lastG = null;
        for (var i = 0; i < menuItems.length; i++) {
            var item = menuItems[i];
            if (item.group && item.group !== lastG) {
                html += '<div class="sidebar-group">' + item.group + '</div>';
                lastG = item.group;
            }
            html += '<div class="sidebar-link' + (item.id === state.page ? ' active' : '') + '" data-page="' + item.id +
                '" onclick="navigateTo(\'' + item.id + '\')">' +
                (item.ord ? '<span class="sidebar-num">' + item.ord + '</span>' : '') +
                '<i class="fa-solid ' + item.icon + ' w-5 text-center text-sm"></i><span>' + item.label + '</span></div>';
        }
        nav.innerHTML = html;
    }

    function toggleSidebar() {
        $('sidebar').classList.toggle('open');
        $('overlay').classList.toggle('show');
    }
    $('overlay').onclick = function() {
        $('sidebar').classList.remove('open');
        $('overlay').classList.remove('show');
    };

    function toggleTheme() {
        state.darkMode = !state.darkMode;
        document.body.classList.toggle('light', !state.darkMode);
        var ic = $('theme-icon');
        if (ic) {
            ic.className = state.darkMode ? 'fa-solid fa-moon text-sm' : 'fa-solid fa-sun text-sm';
            ic.style.color = state.darkMode ? 'var(--tx2)' : 'var(--accent)';
        }
        sv(SK.dark, String(state.darkMode));
    }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    /* -------------------- INIT -------------------- */
    function init() {
        loadState();
        document.body.classList.toggle('light', !state.darkMode);
        var ic = $('theme-icon');
        if (ic) {
            ic.className = state.darkMode ? 'fa-solid fa-moon text-sm' : 'fa-solid fa-sun text-sm';
            ic.style.color = state.darkMode ? 'var(--tx2)' : 'var(--accent)';
        }
        initSidebar();
        updateAuthUI();
        updateHeaderStatus();
        if (state.token) startConnCheck();
        navigateTo(state.page);
    }
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
